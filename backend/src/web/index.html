<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Billology — bill analyzer</title>
<style>
  :root { --bg:#0b1020; --card:#141b2e; --line:#283250; --txt:#e6eaf5; --muted:#94a3c0; --accent:#38bdf8; --accent2:#818cf8; --warn:#f59e0b; --good:#34d399; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif; background:linear-gradient(180deg,#0b1020 0%,#0d1326 100%); color:var(--txt); min-height:100vh; }
  header { padding:26px 20px 22px; background:linear-gradient(135deg,#312e81 0%, #1d4ed8 55%, #0369a1 120%); border-bottom:1px solid rgba(255,255,255,.08); box-shadow:0 10px 30px rgba(2,6,23,.45); }
  .brand { display:flex; gap:14px; align-items:flex-start; }
  .logo { width:46px; height:46px; flex:none; display:flex; align-items:center; justify-content:center; font-size:24px; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22); border-radius:14px; }
  h1 { margin:0; font-size:22px; letter-spacing:.2px; color:#fff; }
  .tag { color:rgba(255,255,255,.78); font-size:13px; margin-top:3px; max-width:560px; }
  .hsel { background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.25); border-radius:10px; padding:7px 10px; font-size:13px; }
  .hsel option { color:var(--txt); background:var(--card); }
  main { max-width:1100px; margin:0 auto; padding:22px 20px 44px; display:grid; grid-template-columns:1.05fr .95fr; gap:18px; align-items:start; }
  .col { display:grid; gap:18px; min-width:0; }
  @media (max-width:920px) { main { grid-template-columns:1fr; } }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; box-shadow:0 10px 28px rgba(2,6,23,.35); }
  textarea { width:100%; min-height:140px; background:#0b1220; color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:11px; font-family:ui-monospace, monospace; font-size:13px; }
  textarea:focus, input:focus, select:focus { outline:2px solid rgba(56,189,248,.4); outline-offset:1px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:10px; }
  button { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#071425; border:0; border-radius:10px; padding:10px 18px; font-weight:700; cursor:pointer; transition:transform .15s ease, filter .15s ease; box-shadow:0 4px 14px rgba(56,189,248,.25); }
  button:hover:not(:disabled) { transform:translateY(-1px); filter:brightness(1.07); }
  button:disabled { opacity:.5; cursor:default; transform:none; box-shadow:none; }
  input[type=file] { color:var(--muted); font-size:13px; }
  .muted { color:var(--muted); font-size:13px; }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  td { padding:7px 0; border-bottom:1px solid var(--line); font-size:14px; }
  td.amt { text-align:right; font-variant-numeric:tabular-nums; }
  .totals td { border:0; } .totals .grand { font-weight:700; font-size:16px; }
  .flag { border-left:4px solid var(--warn); background:#2a210b; padding:11px 12px; border-radius:10px; margin-top:8px; }
  .flag h4 { margin:0 0 4px; color:var(--warn); font-size:14px; }
  /* Unverified (low-confidence scan): a "please check" prompt, not a confirmed error. */
  .flag.unverified { border-left-color:var(--accent); background:#0f1a2e; }
  .flag.unverified h4 { color:var(--accent); }
  .flag .figs { color:var(--muted); font-size:12px; margin-top:4px; }
  .pill { display:inline-block; background:rgba(56,189,248,.12); color:var(--accent); padding:2px 10px; border-radius:12px; font-size:12px; border:1px solid rgba(56,189,248,.25); }
  .ok { color:var(--good); }
  .hidden { display:none; }
  .ex { color:var(--muted); font-size:12px; }
  .err { color:#f87171; }
  .sample { color:var(--accent); cursor:pointer; font-size:12px; text-decoration:underline; text-underline-offset:3px; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-top:12px; }
  .stat { background:#0b1220; border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .stat .l { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
  .stat .v { font-size:18px; font-weight:700; margin-top:4px; font-variant-numeric:tabular-nums; }
  .stat .d { font-size:12px; margin-top:2px; }
  .d.up { color:#f87171; } .d.down { color:var(--good); }
  .dash-section { margin-top:16px; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  .donut-row { display:flex; gap:20px; align-items:center; flex-wrap:wrap; margin-top:8px; }
  .donut-row > div { flex:1; min-width:220px; }
  .bar-fill { transition: width .8s ease; }
  .busy::before { content:""; display:inline-block; width:11px; height:11px; border:2px solid var(--accent);
    border-top-color:transparent; border-radius:50%; animation:spin .9s linear infinite; margin-right:6px; vertical-align:-1px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>

<script>
const SAMPLE = `BigBasket Supermarket
Rice 5kg            500.00
Cooking Oil 1L      200.00
Taxable Value       700.00
CGST 9%             63.00
SGST 9%             63.00
Grand Total         826.00`;

const $ = (id) => document.getElementById(id);
$("sample").onclick = () => { $("text").value = SAMPLE; };

// --- Settings: language + AI provider (persisted in localStorage) ----------
const SETTINGS = Object.assign(
  { lang: "en", provider: "default", groqKey: "", ollamaUrl: "http://localhost:11434", ollamaModel: "llama3.2" },
  JSON.parse(localStorage.getItem("billology.settings") || "{}")
);
function saveSettings() { localStorage.setItem("billology.settings", JSON.stringify(SETTINGS)); }

// Headers consumed by the backend's request-context middleware. The browser
// still only ever talks to this backend — never to a provider directly.
function hdrs(extra) {
  const h = Object.assign({}, extra || {}, { "X-Language": SETTINGS.lang });
  if (SETTINGS.provider === "ollama") {
    h["X-LLM-Provider"] = "ollama";
    if (SETTINGS.ollamaUrl) h["X-Ollama-Url"] = SETTINGS.ollamaUrl;
    if (SETTINGS.ollamaModel) h["X-Ollama-Model"] = SETTINGS.ollamaModel;
  } else if (SETTINGS.provider === "groq-byok" && SETTINGS.groqKey) {
    h["X-LLM-Provider"] = "groq";
    h["X-Groq-Key"] = SETTINGS.groqKey;
  }
  return h;
}

// --- Resilient fetch (Render free-tier cold starts) -------------------------
// The backend sleeps after ~15 min idle; the first hits during wake-up come
// back as a 502/503/504 from the edge proxy with an EMPTY body (so r.json()
// throws "Unexpected end of JSON input") or as an outright network error.
// apiFetch retries those transparently with backoff while signalling onWake.
// An app-level 502 (e.g. a save/persist failure) carries a JSON body and is
// NOT a cold start — we return it to the caller untouched.
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
const GATEWAY_STATUS = new Set([502, 503, 504]);

async function apiFetch(path, opts = {}, { retries = 9, onWake } = {}) {
  let delay = 1500;
  for (let attempt = 0; ; attempt++) {
    let res;
    try {
      res = await fetch(path, opts);
    } catch (netErr) {
      // Connection refused/reset — typical of the very first hit on a cold service.
      if (attempt >= retries) throw netErr;
      if (onWake) onWake(attempt);
      await sleep(delay); delay = Math.min(delay * 1.6, 8000); continue;
    }
    if (GATEWAY_STATUS.has(res.status) && attempt < retries) {
      // Only retry a true edge wake-up: empty or non-JSON body. An app 502
      // (JSON {error, detail}) is a real failure and must reach the caller.
      const text = await res.clone().text();
      if (!text.trim() || !text.trim().startsWith("{")) {
        if (onWake) onWake(attempt);
        await sleep(delay); delay = Math.min(delay * 1.6, 8000); continue;
      }
    }
    return res;
  }
}

// Resilient fetch + JSON parse. Throws an Error (with .status) on a non-ok
// response, reading the friendly reason/detail/error field when present.
async function apiJson(path, opts = {}, cfg = {}) {
  const res = await apiFetch(path, opts, cfg);
  if (!res.ok) {
    let detail = res.statusText || ("HTTP " + res.status);
    try { const b = await res.json(); detail = b.reason || b.detail || b.error || detail; } catch {}
    const err = new Error(detail); err.status = res.status; throw err;
  }
  return res.json();
}

    provDefault: "AI: کلاؤڈ (ایپ کی key)", provByok: "AI: کلاؤڈ (میری Groq key)", provOllama: "AI: لوکل (Ollama)",
    byCategory: "زمرے کے لحاظ سے", topMerchants: "نمایاں دکانیں", thisMonth: "اس مہینے",
    vsLastMonth: "گزشتہ ماہ کے مقابلے", topCategory: "نمایاں زمرہ",
  },
};

function applyLanguage() {
  const dict = I18N[SETTINGS.lang] || I18N.en;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const v = dict[el.dataset.i18n]; if (v) el.textContent = v;
  });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => {
    const v = dict[el.dataset.i18nPh]; if (v) el.placeholder = v;
  });
  document.documentElement.lang = SETTINGS.lang;
  document.documentElement.dir = SETTINGS.lang === "ur" ? "rtl" : "ltr";
}

function applyProviderUI() {
  $("byokRow").classList.toggle("hidden", SETTINGS.provider !== "groq-byok");
  $("ollamaRow").classList.toggle("hidden", SETTINGS.provider !== "ollama");
}

$("setLang").value = SETTINGS.lang;
$("setProvider").value = SETTINGS.provider;
$("setGroqKey").value = SETTINGS.groqKey;
$("setOllamaUrl").value = SETTINGS.ollamaUrl;
$("setOllamaModel").value = SETTINGS.ollamaModel;
$("setLang").onchange = () => { SETTINGS.lang = $("setLang").value; saveSettings(); applyLanguage(); };
$("setProvider").onchange = () => { SETTINGS.provider = $("setProvider").value; saveSettings(); applyProviderUI(); };
$("setGroqKey").oninput = () => { SETTINGS.groqKey = $("setGroqKey").value.trim(); saveSettings(); };
$("setOllamaUrl").oninput = () => { SETTINGS.ollamaUrl = $("setOllamaUrl").value.trim(); saveSettings(); };
$("setOllamaModel").oninput = () => { SETTINGS.ollamaModel = $("setOllamaModel").value.trim(); saveSettings(); };
applyLanguage();
applyProviderUI();

$("go").onclick = async () => {
  const status = $("status"); const result = $("result");
  status.textContent = "Analyzing…"; status.className = "muted busy"; $("go").disabled = true; result.classList.add("hidden");
  try {
    const form = new FormData();
    const file = $("file").files[0];
    if (file) form.append("files", file);
    if ($("text").value.trim()) form.append("text", $("text").value);
    const dict = I18N[SETTINGS.lang] || I18N.en;
    const res = await apiFetch(
      "/bills:process",
      { method: "POST", body: form, headers: hdrs() },
      { onWake: () => { status.textContent = dict.wakingServer || I18N.en.wakingServer; status.className = "muted busy"; } }
    );
    if (res.status === 422) { const b = await res.json(); status.textContent = "⚠ " + (b.reason || "Couldn't read a bill."); status.className = "err"; return; }
    if (!res.ok) { status.textContent = "Error: " + res.status; status.className = "err"; return; }
    render(await res.json()); status.textContent = ""; status.className = "muted";
  } catch (e) { status.textContent = "Network error: " + e; status.className = "err"; }
  finally { $("go").disabled = false; }
};

function money(t) { return t && t.value != null ? "₹" + t.value : "—"; }

let lastBill = null;

function render(bill) {
  lastBill = bill;
  $("saveStatus").textContent = "";
  $("saveBtn").disabled = false;
  const suggested = (bill.category && bill.category.name) || "Other";
  if ([...$("saveCat").options].some(o => o.value === suggested)) $("saveCat").value = suggested;
  $("result").classList.remove("hidden");
  $("merchant").textContent = (bill.merchant && bill.merchant.value) || "Bill";
  $("type").textContent = bill.bill_type || "";
  $("category").textContent = (bill.category && bill.category.name) || "";
  $("summary").textContent = (bill.explanation && bill.explanation.bill_summary) || "";

  const flags = $("flags"); flags.innerHTML = "";
  const totalNum = bill.total_amount && bill.total_amount.value != null ? parseFloat(bill.total_amount.value) : null;
  if (bill.discrepancies && bill.discrepancies.length) {
    bill.discrepancies.forEach(f => {
      const figs = Object.entries(f.conflicting_figures || {}).map(([k,v]) => `${k.replace(/_/g," ")}: ${v}`).join(" · ");
      // verified === false ⇒ a low-confidence scan fed this check, so present it
      // as "couldn't confirm — please check", never as a confirmed error.
      const unverified = f.verified === false;
      const head = unverified ? "❓ Couldn't confirm — please check the scan" : `⚠ ${f.kind.replace(/_/g," ")}`;
      flags.innerHTML += `<div class="flag${unverified ? " unverified" : ""}"><h4>${head}</h4><div>${f.explanation_text||""}</div><div class="figs">${figs}</div></div>`;
    });
  } else if (!totalNum) {
    // No usable total ⇒ extraction was unreliable; an empty discrepancy list
    // proves nothing, so never show it as a pass.
    flags.innerHTML = `<div class="flag"><h4>⚠ Low-confidence scan</h4><div>Couldn't reliably read this bill (no total found). Figures may be incomplete — try a clearer, closer photo, a PDF, or pasted text.</div></div>`;
  } else {
    flags.innerHTML = `<div class="ok" style="margin-top:8px">✓ No discrepancies — the figures are internally consistent.</div>`;
  }

  const lineExpl = (bill.explanation && bill.explanation.line_explanations) || {};
  const items = $("items"); items.innerHTML = "";
  (bill.line_items || []).forEach(li => {
    const ex = lineExpl[String(li.position)] ? `<div class="ex">${lineExpl[String(li.position)]}</div>` : "";
    items.innerHTML += `<tr><td>${(li.description && li.description.value)||"Item"}${ex}</td><td class="amt">${money(li.line_total)}</td></tr>`;
  });
  if (bill.nothing_to_verify) items.innerHTML = `<tr><td class="muted">No itemized breakdown — nothing to verify.</td></tr>`;

  const totals = $("totals"); totals.innerHTML = "";
  if (bill.subtotal && bill.subtotal.value) totals.innerHTML += `<tr><td>Subtotal</td><td class="amt">${money(bill.subtotal)}</td></tr>`;
  if (bill.tax_amount && bill.tax_amount.value) {
    const rate = bill.tax_rate && bill.tax_rate.value ? ` (${bill.tax_rate.value}%)` : "";
    totals.innerHTML += `<tr><td>Tax${rate}</td><td class="amt">${money(bill.tax_amount)}</td></tr>`;
  }
  totals.innerHTML += `<tr class="grand"><td>Total</td><td class="amt">${money(bill.total_amount)}</td></tr>`;
}

// --- History / search / clear-data ---------------------------------------
async function loadHistory() {
  const params = new URLSearchParams();
  if ($("histQ").value.trim()) params.set("q", $("histQ").value.trim());
  if ($("histCat").value) params.set("category", $("histCat").value);
  const res = await apiFetch("/bills?" + params.toString(), { headers: hdrs() });
  if (!res.ok) { $("histCount").textContent = "Couldn't load history."; return; }
  const rows = await res.json();
  const tbl = $("histRows"); tbl.innerHTML = "";
  rows.forEach(r => {
    tbl.innerHTML += `<tr>
      <td>${r.merchant || "Unknown"}<div class="ex">${r.bill_date || "no date"}${r.category ? " · " + r.category : ""}</div></td>
      <td class="amt">₹${r.total_amount ?? "—"}</td>
      <td class="amt" style="width:30px"><span class="sample" data-del="${r.id}">✕</span></td>
    </tr>`;
  });
  if (!rows.length) {
    tbl.innerHTML = `<tr><td colspan="3" class="muted">No bills saved yet. Start by uploading a bill above.</td></tr>`;
  }
  $("histCount").textContent = `${rows.length} bill(s)`;
  tbl.querySelectorAll("[data-del]").forEach(el => {
    el.onclick = async () => {
      if (!confirm("Delete this bill?")) return;
      try { await apiFetch("/bills/" + el.dataset.del, { method: "DELETE", headers: hdrs() }); } catch {}
      loadHistory();
    };
  });
}
// --- Save the analyzed candidate ---------------------------------------------
$("saveBtn").onclick = async () => {
  if (!lastBill) return;
  $("saveBtn").disabled = true; $("saveStatus").textContent = "Saving…";
  try {
    const payload = { ...lastBill, category: { name: $("saveCat").value } };
    const form = new FormData();
    form.append("candidate", JSON.stringify(payload));
    const f = $("file").files[0];
    if (f) form.append("files", f); // archive the original alongside the record
    const res = await fetch("/bills", { method: "POST", body: form, headers: hdrs() });
    const body = await res.json();
    if (res.status === 201) {
      $("saveStatus").textContent = "✓ Saved";
      loadHistory(); loadDash();
    } else {
      $("saveStatus").textContent = "Save failed: " + (body.detail || body.error || res.status);
      $("saveBtn").disabled = false;
    }
  } catch (e) {
    $("saveStatus").textContent = "Network error: " + e;
    $("saveBtn").disabled = false;
  }
};

// --- Q&A -------------------------------------------------------------------
async function ask() {
  const q = $("qaQ").value.trim();
  if (!q) return;
  $("qaStatus").textContent = "Thinking…"; $("qaStatus").className = "muted busy"; $("qaGo").disabled = true;
  $("qaAnswer").classList.add("hidden"); $("qaRecords").innerHTML = "";
  try {
    const dict = I18N[SETTINGS.lang] || I18N.en;
    const res = await apiFetch(
      "/qa",
      { method: "POST", headers: hdrs({ "Content-Type": "application/json" }), body: JSON.stringify({ question: q }) },
      { onWake: () => { $("qaStatus").textContent = dict.wakingServer || I18N.en.wakingServer; $("qaStatus").className = "muted busy"; } }
    );
    if (!res.ok) { $("qaStatus").textContent = "Error: " + res.status; $("qaStatus").className = "err"; return; }
    const body = await res.json();
    $("qaStatus").textContent = body.path ? `(${body.path} path)` : ""; $("qaStatus").className = "muted";
    $("qaAnswer").textContent = body.answer || "No answer.";
    $("qaAnswer").classList.remove("hidden");
    (body.records || []).forEach(r => {
      // Item-level answers carry the product name; show it as the row title with
      // the merchant/date beneath, and the item's own amount on the right.
      const title = r.item || r.merchant || "Unknown";
      const sub = r.item
        ? `${r.merchant || ""}${r.bill_date ? " · " + r.bill_date : ""}`
        : `${r.bill_date || "no date"}${r.category ? " · " + r.category : ""}`;
      $("qaRecords").innerHTML += `<tr>
        <td>${title}<div class="ex">${sub}</div></td>
        <td class="amt">₹${r.total_amount ?? "—"}</td></tr>`;
    });
  } catch (e) { $("qaStatus").textContent = "Network error: " + e; $("qaStatus").className = "err"; }
  finally { $("qaGo").disabled = false; }
}
$("qaGo").onclick = ask;
$("qaQ").addEventListener("keydown", (e) => { if (e.key === "Enter") ask(); });

// --- Spending dashboard ------------------------------------------------------
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
const inr = (n) => "₹" + (+n).toLocaleString("en-IN", { maximumFractionDigits: 2 });

function bar(label, value, max, color) {
  const pct = max > 0 ? Math.max(2, Math.round(value / max * 100)) : 0;
  return `<div style="margin-top:6px">
    <div style="display:flex;justify-content:space-between;font-size:13px;gap:8px">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(label)}</span>
      <span style="font-variant-numeric:tabular-nums;flex:none">${inr(value)}</span>
    </div>
    <div style="background:#0b1220;border-radius:4px;height:8px;margin-top:3px">
      <div class="bar-fill" style="width:0%;height:8px;border-radius:4px;background:${color}" data-w="${pct}"></div>
    </div></div>`;
}

function monthLabel(ym) {
  try {
    const [y, m] = ym.split("-");
    return new Date(+y, +m - 1, 1).toLocaleString(SETTINGS.lang, { month: "short", year: "2-digit" });
  } catch { return ym; }
}

// Donut: one SVG stroke segment per category, swept open via CSS transition.
function renderDonut(cats, total) {
  const R = 52, C = 2 * Math.PI * R;
  let offset = 0, segs = "";
  cats.forEach((c, i) => {
    const frac = total > 0 ? (+c.total) / total : 0;
    const len = Math.max(frac * C - 2, 0); // 2px gap between segments
    segs += `<circle r="${R}" cx="65" cy="65" fill="none" stroke="${DASH_COLORS[i % DASH_COLORS.length]}"
      stroke-width="15" stroke-linecap="butt" stroke-dasharray="0 ${C}" data-target="${len} ${C - len}"
      stroke-dashoffset="${-offset}" transform="rotate(-90 65 65)" style="transition:stroke-dasharray .9s ease"></circle>`;
    offset += frac * C;
  });
  $("dashDonut").innerHTML = segs +
    `<text x="65" y="70" text-anchor="middle" fill="var(--txt)" font-size="15" font-weight="700">${esc(inr(total))}</text>`;
}

function animateDash() {
  requestAnimationFrame(() => {
    document.querySelectorAll(".bar-fill[data-w]").forEach(el => { el.style.width = el.dataset.w + "%"; });
    document.querySelectorAll("#dashDonut circle[data-target]").forEach(el => el.setAttribute("stroke-dasharray", el.dataset.target));
  });
}

const DASH_COLORS = ["#38bdf8","#34d399","#f59e0b","#f472b6","#a78bfa","#22d3ee","#94a3b8"];
async function loadDash() {
  const dict = I18N[SETTINGS.lang] || I18N.en;
  const waking = () => {
    $("dashCats").innerHTML = `<div class="muted busy">${esc(dict.wakingServer || I18N.en.wakingServer)}</div>`;
  };
  try {
    const [cats, months, bills] = await Promise.all([
      apiJson("/dashboard/by-category", { headers: hdrs() }, { onWake: waking }),
      apiJson("/dashboard/monthly", { headers: hdrs() }, { onWake: waking }),
      apiJson("/bills", { headers: hdrs() }, { onWake: waking }).catch(() => []),
    ]);
    cats.sort((a, b) => (+b.total) - (+a.total));

    // Stat cards: this month, change vs last month, top category.
    const now = new Date();
    const ym = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    const cur = +(months.find(m => m.month === ym(now))?.total ?? 0);
    const prev = +(months.find(m => m.month === ym(new Date(now.getFullYear(), now.getMonth() - 1, 1)))?.total ?? 0);
    const deltaPct = prev > 0 ? ((cur - prev) / prev) * 100 : null;
    const deltaHtml = deltaPct === null ? "" :
      `<div class="d ${deltaPct >= 0 ? "up" : "down"}">${deltaPct >= 0 ? "▲" : "▼"} ${Math.abs(deltaPct).toFixed(0)}% <span class="muted">${esc(dict.vsLastMonth)}</span></div>`;
    const top = cats[0];
    $("dashStats").innerHTML = cats.length ? [
      `<div class="stat"><div class="l">${esc(dict.thisMonth)}</div><div class="v">${esc(inr(cur))}</div>${deltaHtml}</div>`,
      top ? `<div class="stat"><div class="l">${esc(dict.topCategory)}</div><div class="v" style="font-size:15px">${esc(top.category)}</div><div class="d muted">${esc(inr(+top.total))}</div></div>` : "",
      `<div class="stat"><div class="l">${esc(dict.billsTitle.replace(/^\S+\s/, ""))}</div><div class="v">${bills.length}</div></div>`,
    ].join("") : "";

    const total = cats.reduce((s, c) => s + (+c.total), 0);
    renderDonut(cats, total);
    const cmax = Math.max(...cats.map(c => +c.total), 0);
    $("dashCats").innerHTML = cats.length
      ? cats.map((c, i) => bar(c.category, +c.total, cmax, DASH_COLORS[i % DASH_COLORS.length])).join("")
      : `<div class="muted">No bills saved yet. Start by uploading a bill.</div>`;

    const mmax = Math.max(...months.map(m => +m.total), 0);
    $("dashMonths").innerHTML = months.length
      ? months.map(m => bar(monthLabel(m.month), +m.total, mmax, "#38bdf8")).join("")
      : `<div class="muted">No saved bills yet.</div>`;

    // Top merchants from saved bills (small dataset; aggregated client-side).
    const byMerchant = {};
    bills.forEach(b => {
      const m = b.merchant || "—";
      byMerchant[m] = (byMerchant[m] || 0) + (+b.total_amount || 0);
    });
    const tops = Object.entries(byMerchant).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const tmax = tops.length ? tops[0][1] : 0;
    $("dashMerchants").innerHTML = tops.length
      ? tops.map(([m, v], i) => bar(m, v, tmax, DASH_COLORS[i % DASH_COLORS.length])).join("")
      : `<div class="muted">No saved bills yet.</div>`;

    animateDash();
  } catch (e) {
    $("dashCats").innerHTML = `<div class="err">Couldn't load spending: ${e}</div>`;
  }
}
$("dashRefresh").onclick = loadDash;
loadDash();

$("histRefresh").onclick = loadHistory;
$("histQ").oninput = () => { clearTimeout(window.__hq); window.__hq = setTimeout(loadHistory, 300); };
$("histCat").onchange = loadHistory;
$("histClear").onclick = async () => {
  if (!confirm("Delete ALL saved bills (including seeded demo data)? This cannot be undone.")) return;
  try {
    const res = await apiFetch("/bills", { method: "DELETE", headers: hdrs() });
    const body = await res.json().catch(() => ({}));
    alert(res.ok ? `${body.deleted ?? 0} bill(s) deleted.` : "Clear failed.");
  } catch (e) { alert("Clear failed: " + e); }
  loadHistory();
};
loadHistory();
</script>
