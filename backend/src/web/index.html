<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Billology — bill analyzer</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --line:#334155; --txt:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --warn:#f59e0b; --good:#34d399; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:24px 20px; border-bottom:1px solid var(--line); }
  h1 { margin:0; font-size:22px; } .tag { color:var(--muted); font-size:13px; margin-top:4px; }
  main { max-width:880px; margin:0 auto; padding:20px; display:grid; gap:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  textarea { width:100%; min-height:150px; background:#0b1220; color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:10px; font-family:ui-monospace, monospace; font-size:13px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:10px; }
  button { background:var(--accent); color:#04293a; border:0; border-radius:8px; padding:10px 16px; font-weight:700; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  input[type=file] { color:var(--muted); font-size:13px; }
  .muted { color:var(--muted); font-size:13px; }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  td { padding:6px 0; border-bottom:1px solid var(--line); font-size:14px; }
  td.amt { text-align:right; font-variant-numeric:tabular-nums; }
  .totals td { border:0; } .totals .grand { font-weight:700; font-size:16px; }
  .flag { border-left:4px solid var(--warn); background:#2a210b; padding:10px; border-radius:6px; margin-top:8px; }
  .flag h4 { margin:0 0 4px; color:var(--warn); font-size:14px; }
  .flag .figs { color:var(--muted); font-size:12px; margin-top:4px; }
  .pill { display:inline-block; background:#0b3a4a; color:var(--accent); padding:2px 10px; border-radius:12px; font-size:12px; }
  .ok { color:var(--good); }
  .hidden { display:none; }
  .ex { color:var(--muted); font-size:12px; }
  .err { color:#f87171; }
  .sample { color:var(--accent); cursor:pointer; font-size:12px; text-decoration:underline; }
</style>
</head>
<body>
<header>
  <h1>🧾 Billology</h1>
  <div class="tag">Submit a bill (image / PDF / pasted text). It extracts the data, checks it for provable errors, and explains it — numbers come straight from the bill, never the AI.</div>
</header>
<main>
  <div class="card">
    <label class="muted">Paste bill text</label>
    <textarea id="text" placeholder="Paste a bill here…"></textarea>
    <div class="row">
      <input type="file" id="file" accept="image/*,application/pdf" />
      <button id="go">Analyze bill</button>
      <span class="sample" id="sample">load a sample</span>
    </div>
    <div id="status" class="muted"></div>
  </div>

  <div id="result" class="card hidden">
    <div class="row" style="justify-content:space-between">
      <div><strong id="merchant"></strong> <span class="pill" id="type"></span> <span class="pill" id="category"></span></div>
    </div>
    <div id="summary" class="muted" style="margin-top:8px"></div>
    <div id="flags"></div>
    <table id="items"></table>
    <table class="totals" id="totals"></table>
    <div class="row" style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px">
      <select id="saveCat" style="background:#0b1220;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px">
        <option>Telecom/Recharge</option><option>Groceries</option><option>Utilities</option>
        <option>Food &amp; Dining</option><option>Shopping</option><option>Other</option>
      </select>
      <button id="saveBtn">💾 Save bill</button>
      <span id="saveStatus" class="muted"></span>
    </div>
  </div>

  <div class="card">
    <strong>💬 Ask about your spending</strong>
    <div class="row">
      <input type="text" id="qaQ" placeholder="e.g. How much did I spend on groceries in May?" style="flex:1;min-width:200px;background:#0b1220;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px" />
      <button id="qaGo">Ask</button>
    </div>
    <div id="qaStatus" class="muted"></div>
    <div id="qaAnswer" class="hidden" style="margin-top:10px;padding:12px;background:#0b1220;border:1px solid var(--line);border-radius:8px;white-space:pre-wrap"></div>
    <table id="qaRecords"></table>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <strong>📊 Spending</strong>
      <span class="sample" id="dashRefresh">refresh</span>
    </div>
    <div id="dashCats" style="margin-top:10px"></div>
    <div class="muted" style="margin-top:14px;font-size:12px;text-transform:uppercase;letter-spacing:.05em">Monthly trend</div>
    <div id="dashMonths" style="margin-top:6px"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <strong>📂 My bills</strong>
      <span class="sample" id="histRefresh">refresh</span>
    </div>
    <div class="row">
      <input type="text" id="histQ" placeholder="Search merchant…" style="flex:1;min-width:160px;background:#0b1220;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px" />
      <select id="histCat" style="background:#0b1220;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px">
        <option value="">All categories</option>
        <option>Telecom/Recharge</option><option>Groceries</option><option>Utilities</option>
        <option>Food &amp; Dining</option><option>Shopping</option><option>Other</option>
      </select>
    </div>
    <table id="histRows"></table>
    <div class="row" style="justify-content:space-between;margin-top:10px">
      <span class="muted" id="histCount"></span>
      <button id="histClear" style="background:#7f1d1d;color:#fecaca">Clear all data</button>
    </div>
  </div>
</main>

<script>
const SAMPLE = `BigBasket Supermarket
Rice 5kg            500.00
Cooking Oil 1L      200.00
Taxable Value       700.00
CGST 9%             63.00
SGST 9%             63.00
Grand Total         826.00`;

const $ = (id) => document.getElementById(id);
$("sample").onclick = () => { $("text").value = SAMPLE; };

$("go").onclick = async () => {
  const status = $("status"); const result = $("result");
  status.textContent = "Analyzing…"; status.className = "muted"; $("go").disabled = true; result.classList.add("hidden");
  try {
    const form = new FormData();
    const file = $("file").files[0];
    if (file) form.append("files", file);
    if ($("text").value.trim()) form.append("text", $("text").value);
    const res = await fetch("/bills:process", { method: "POST", body: form });
    if (res.status === 422) { const b = await res.json(); status.textContent = "⚠ " + (b.reason || "Couldn't read a bill."); status.className = "err"; return; }
    if (!res.ok) { status.textContent = "Error: " + res.status; status.className = "err"; return; }
    render(await res.json()); status.textContent = "";
  } catch (e) { status.textContent = "Network error: " + e; status.className = "err"; }
  finally { $("go").disabled = false; }
};

function money(t) { return t && t.value != null ? "₹" + t.value : "—"; }

let lastBill = null;

function render(bill) {
  lastBill = bill;
  $("saveStatus").textContent = "";
  $("saveBtn").disabled = false;
  const suggested = (bill.category && bill.category.name) || "Other";
  if ([...$("saveCat").options].some(o => o.value === suggested)) $("saveCat").value = suggested;
  $("result").classList.remove("hidden");
  $("merchant").textContent = (bill.merchant && bill.merchant.value) || "Bill";
  $("type").textContent = bill.bill_type || "";
  $("category").textContent = (bill.category && bill.category.name) || "";
  $("summary").textContent = (bill.explanation && bill.explanation.bill_summary) || "";

  const flags = $("flags"); flags.innerHTML = "";
  const totalNum = bill.total_amount && bill.total_amount.value != null ? parseFloat(bill.total_amount.value) : null;
  if (bill.discrepancies && bill.discrepancies.length) {
    bill.discrepancies.forEach(f => {
      const figs = Object.entries(f.conflicting_figures || {}).map(([k,v]) => `${k.replace(/_/g," ")}: ${v}`).join(" · ");
      flags.innerHTML += `<div class="flag"><h4>⚠ ${f.kind.replace(/_/g," ")}</h4><div>${f.explanation_text||""}</div><div class="figs">${figs}</div></div>`;
    });
  } else if (!totalNum) {
    // No usable total ⇒ extraction was unreliable; an empty discrepancy list
    // proves nothing, so never show it as a pass.
    flags.innerHTML = `<div class="flag"><h4>⚠ Low-confidence scan</h4><div>Couldn't reliably read this bill (no total found). Figures may be incomplete — try a clearer, closer photo, a PDF, or pasted text.</div></div>`;
  } else {
    flags.innerHTML = `<div class="ok" style="margin-top:8px">✓ No discrepancies — the figures are internally consistent.</div>`;
  }

  const lineExpl = (bill.explanation && bill.explanation.line_explanations) || {};
  const items = $("items"); items.innerHTML = "";
  (bill.line_items || []).forEach(li => {
    const ex = lineExpl[String(li.position)] ? `<div class="ex">${lineExpl[String(li.position)]}</div>` : "";
    items.innerHTML += `<tr><td>${(li.description && li.description.value)||"Item"}${ex}</td><td class="amt">${money(li.line_total)}</td></tr>`;
  });
  if (bill.nothing_to_verify) items.innerHTML = `<tr><td class="muted">No itemized breakdown — nothing to verify.</td></tr>`;

  const totals = $("totals"); totals.innerHTML = "";
  if (bill.subtotal && bill.subtotal.value) totals.innerHTML += `<tr><td>Subtotal</td><td class="amt">${money(bill.subtotal)}</td></tr>`;
  if (bill.tax_amount && bill.tax_amount.value) {
    const rate = bill.tax_rate && bill.tax_rate.value ? ` (${bill.tax_rate.value}%)` : "";
    totals.innerHTML += `<tr><td>Tax${rate}</td><td class="amt">${money(bill.tax_amount)}</td></tr>`;
  }
  totals.innerHTML += `<tr class="grand"><td>Total</td><td class="amt">${money(bill.total_amount)}</td></tr>`;
}

// --- History / search / clear-data ---------------------------------------
async function loadHistory() {
  const params = new URLSearchParams();
  if ($("histQ").value.trim()) params.set("q", $("histQ").value.trim());
  if ($("histCat").value) params.set("category", $("histCat").value);
  const res = await fetch("/bills?" + params.toString());
  if (!res.ok) { $("histCount").textContent = "Couldn't load history."; return; }
  const rows = await res.json();
  const tbl = $("histRows"); tbl.innerHTML = "";
  rows.forEach(r => {
    tbl.innerHTML += `<tr>
      <td>${r.merchant || "Unknown"}<div class="ex">${r.bill_date || "no date"}${r.category ? " · " + r.category : ""}</div></td>
      <td class="amt">₹${r.total_amount ?? "—"}</td>
      <td class="amt" style="width:30px"><span class="sample" data-del="${r.id}">✕</span></td>
    </tr>`;
  });
  $("histCount").textContent = `${rows.length} bill(s)`;
  tbl.querySelectorAll("[data-del]").forEach(el => {
    el.onclick = async () => {
      if (!confirm("Delete this bill?")) return;
      await fetch("/bills/" + el.dataset.del, { method: "DELETE" });
      loadHistory();
    };
  });
}
// --- Save the analyzed candidate ---------------------------------------------
$("saveBtn").onclick = async () => {
  if (!lastBill) return;
  $("saveBtn").disabled = true; $("saveStatus").textContent = "Saving…";
  try {
    const payload = { ...lastBill, category: { name: $("saveCat").value } };
    const form = new FormData();
    form.append("candidate", JSON.stringify(payload));
    const f = $("file").files[0];
    if (f) form.append("files", f); // archive the original alongside the record
    const res = await fetch("/bills", { method: "POST", body: form });
    const body = await res.json();
    if (res.status === 201) {
      $("saveStatus").textContent = "✓ Saved";
      loadHistory(); loadDash();
    } else {
      $("saveStatus").textContent = "Save failed: " + (body.detail || body.error || res.status);
      $("saveBtn").disabled = false;
    }
  } catch (e) {
    $("saveStatus").textContent = "Network error: " + e;
    $("saveBtn").disabled = false;
  }
};

// --- Q&A -------------------------------------------------------------------
async function ask() {
  const q = $("qaQ").value.trim();
  if (!q) return;
  $("qaStatus").textContent = "Thinking…"; $("qaGo").disabled = true;
  $("qaAnswer").classList.add("hidden"); $("qaRecords").innerHTML = "";
  try {
    const res = await fetch("/qa", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q }),
    });
    const body = await res.json();
    if (!res.ok) { $("qaStatus").textContent = "Error: " + res.status; return; }
    $("qaStatus").textContent = body.path ? `(${body.path} path)` : "";
    $("qaAnswer").textContent = body.answer || "No answer.";
    $("qaAnswer").classList.remove("hidden");
    (body.records || []).forEach(r => {
      $("qaRecords").innerHTML += `<tr>
        <td>${r.merchant || "Unknown"}<div class="ex">${r.bill_date || "no date"}${r.category ? " · " + r.category : ""}</div></td>
        <td class="amt">₹${r.total_amount ?? "—"}</td></tr>`;
    });
  } catch (e) { $("qaStatus").textContent = "Network error: " + e; }
  finally { $("qaGo").disabled = false; }
}
$("qaGo").onclick = ask;
$("qaQ").addEventListener("keydown", (e) => { if (e.key === "Enter") ask(); });

// --- Spending dashboard ------------------------------------------------------
function bar(label, value, max, color) {
  const pct = max > 0 ? Math.max(2, Math.round(value / max * 100)) : 0;
  return `<div style="margin-top:6px">
    <div style="display:flex;justify-content:space-between;font-size:13px">
      <span>${label}</span><span style="font-variant-numeric:tabular-nums">₹${value.toFixed(2)}</span>
    </div>
    <div style="background:#0b1220;border-radius:4px;height:8px;margin-top:3px">
      <div style="width:${pct}%;height:8px;border-radius:4px;background:${color}"></div>
    </div></div>`;
}
const DASH_COLORS = ["#38bdf8","#34d399","#f59e0b","#f472b6","#a78bfa","#22d3ee","#94a3b8"];
async function loadDash() {
  try {
    const [cats, months] = await Promise.all([
      fetch("/dashboard/by-category").then(r => r.json()),
      fetch("/dashboard/monthly").then(r => r.json()),
    ]);
    const cmax = Math.max(...cats.map(c => +c.total), 0);
    $("dashCats").innerHTML = cats.length
      ? cats.map((c, i) => bar(c.category, +c.total, cmax, DASH_COLORS[i % DASH_COLORS.length])).join("")
      : `<div class="muted">No saved bills yet.</div>`;
    const mmax = Math.max(...months.map(m => +m.total), 0);
    $("dashMonths").innerHTML = months.length
      ? months.map(m => bar(m.month, +m.total, mmax, "#38bdf8")).join("")
      : `<div class="muted">No saved bills yet.</div>`;
  } catch (e) {
    $("dashCats").innerHTML = `<div class="err">Couldn't load spending: ${e}</div>`;
  }
}
$("dashRefresh").onclick = loadDash;
loadDash();

$("histRefresh").onclick = loadHistory;
$("histQ").oninput = () => { clearTimeout(window.__hq); window.__hq = setTimeout(loadHistory, 300); };
$("histCat").onchange = loadHistory;
$("histClear").onclick = async () => {
  if (!confirm("Delete ALL saved bills (including seeded demo data)? This cannot be undone.")) return;
  const res = await fetch("/bills", { method: "DELETE" });
  const body = await res.json();
  alert(res.ok ? `${body.deleted} bill(s) deleted.` : "Clear failed.");
  loadHistory();
};
loadHistory();
</script>
</body>
</html>
