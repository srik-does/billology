[tool.ruff]
line-length = 100
target-version = "py311"
src = ["backend/src"]
extend-exclude = ["venv", "mobile", ".specify"]

[tool.ruff.lint]
# Correctness-focused: pyflakes, pycodestyle errors, import hygiene.
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # long lines tolerated; prose-heavy prompts/docstrings

[tool.mypy]
python_version = "3.11"
files = ["backend/src"]
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
exclude = "venv|mobile"
