# GitHub Actions CI — mirrors .gitlab-ci.yml: lint → typecheck → test → audit.
# Lint and the backend test suite gate the pipeline; network-dependent scans
# and the mobile typecheck are advisory (continue-on-error), matching GitLab.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet ruff
      - run: ruff check backend/src
      - run: ruff format --check backend/src

  typecheck:
    name: mypy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet mypy fastapi pydantic pydantic-settings
      - run: mypy --config-file pyproject.toml

  test:
    name: pytest + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install system OCR dependencies (fallback pipeline)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr poppler-utils
      - run: pip install --quiet -r requirements.txt
        working-directory: backend
      - run: pytest tests/ --cov=src --cov-report=term
        working-directory: backend

  secrets-scan:
    name: gitleaks (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency-audit:
    name: pip-audit + npm audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet pip-audit
      - run: pip-audit -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Expo SDK pulls in transitive advisories that can't be fixed without
      # breaking the SDK; gate on genuinely critical only (matches GitLab CI).
      - run: npm install --legacy-peer-deps --no-audit --no-fund
        working-directory: mobile
      - run: npm audit --audit-level=critical
        working-directory: mobile

  mobile-typecheck:
    name: tsc --noEmit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps --no-audit --no-fund
        working-directory: mobile
      - run: npx tsc --noEmit
        working-directory: mobile
