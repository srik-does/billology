# GitLab CI: lint → typecheck → test (with coverage) → security/audit.
# Lint and tests gate the pipeline; network-dependent scans are advisory.

stages:
  - lint
  - typecheck
  - test
  - security
  - build
  - package
  - release

ruff:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install --quiet ruff
    - ruff check backend/src

mypy:
  stage: typecheck
  image: python:3.11-slim
  allow_failure: true
  script:
    - pip install --quiet mypy
    - pip install --quiet fastapi pydantic pydantic-settings
    - mypy --config-file pyproject.toml

pytest:
  stage: test
  image: python:3.11-slim
  script:
    - apt-get update -qq && apt-get install -y -qq tesseract-ocr poppler-utils > /dev/null
    - cd backend
    - pip install --quiet -r requirements.txt
    - pytest tests/ --cov=src --cov-report=term --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  allow_failure: true
  script:
    - gitleaks detect --source . --config .gitleaks.toml --verbose --no-banner

pip-audit:
  stage: security
  image: python:3.11-slim
  allow_failure: true
  script:
    - pip install --quiet pip-audit
    - pip-audit -r backend/requirements.txt

npm-audit:
  stage: security
  image: node:20-slim
  allow_failure: true
  script:
    - cd mobile
    # Expo SDK pulls in transitive moderate/high advisories (uuid via xcode/@expo/*)
    # that can't be fixed without breaking the SDK; gate on genuinely critical only.
    - npm audit --audit-level=critical

changelog:
  stage: security
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - git-cliff --config cliff.toml --latest

# --- Release automation (tags only) --------------------------------------
# Decoupled from EAS's unpredictable free-tier queue so no single job has to
# sit through a build and hit the runner's 1h timeout:
#   build-apk (manual) → triggers the EAS cloud build and returns immediately.
#   fetch-apk (manual) → click once that build shows "finished" on expo.dev;
#                        it downloads the finished APK and uploads it to the
#                        generic Package Registry.
#   release-apk (auto) → creates the GitLab Release with the APK as an asset.
# Requires a masked CI/CD variable EXPO_TOKEN so EAS runs non-interactively.

build-apk:
  stage: build
  image: node:20
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: true
  script:
    - npm install -g eas-cli
    - cd mobile
    - npm install --legacy-peer-deps
    # Queue the cloud build (preview profile → apk) and return immediately;
    # the build finishes on Expo's servers. Watch it at expo.dev, then run
    # the manual fetch-apk job below.
    - eas build --platform android --profile preview --non-interactive --no-wait

fetch-apk:
  stage: package
  image: node:20
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: false
  script:
    - apt-get update -qq && apt-get install -y -qq curl > /dev/null
    - npm install -g eas-cli
    - eas --version
    # Must run from the Expo project dir (app.json / eas.json live in mobile/).
    - cd mobile
    # eas build:list loads the Expo project config, which requires the project's
    # node_modules (the `expo` package) to resolve app.json → projectId.
    - npm install --legacy-peer-deps
    - 'echo "eas whoami:"; eas whoami || true'
    # Human-readable diagnostic prints the real error that --json collapses.
    - 'echo "=== build:list diagnostic ==="; eas build:list --limit 3 --non-interactive || true'
    # List recent builds as JSON; capture both streams so a failure is visible.
    - |
      set +e
      eas build:list --limit 10 --non-interactive --json > ../build.json 2> ../eas-err.txt
      code=$?
      set -e
      if [ $code -ne 0 ]; then echo "=== stderr ==="; cat ../eas-err.txt; echo "=== stdout ==="; cat ../build.json; exit 1; fi
    - cd ..
    # Pick the newest FINISHED Android build that has a downloadable artifact.
    - |
      APK_URL=$(node -e "const b=require('./build.json'); const arr=Array.isArray(b)?b:[b]; const p=arr.find(x=>String(x.platform||'').toUpperCase()==='ANDROID' && String(x.status||'').toUpperCase()==='FINISHED' && ((x.artifacts||{}).applicationArchiveUrl||(x.artifacts||{}).buildUrl)); const a=(p||{}).artifacts||{}; process.stdout.write(a.applicationArchiveUrl||a.buildUrl||'')")
      if [ -z "$APK_URL" ]; then echo "No finished Android build with an artifact found:"; cat build.json; exit 1; fi
      echo "Downloading APK from $APK_URL"
      curl -L --fail --silent --show-error -o "billology-${CI_COMMIT_TAG}.apk" "$APK_URL"
    # Publish to the generic Package Registry so the Release can link to it.
    - |
      curl --fail --silent --show-error \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file "billology-${CI_COMMIT_TAG}.apk" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/billology/${CI_COMMIT_TAG}/billology-${CI_COMMIT_TAG}.apk"
  artifacts:
    paths:
      - "billology-${CI_COMMIT_TAG}.apk"
    expire_in: never

release-apk:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: fetch-apk
      artifacts: true
  script:
    - echo "Publishing GitLab Release for ${CI_COMMIT_TAG} with the APK asset."
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Billology $CI_COMMIT_TAG"
    description: |
      ## Billology $CI_COMMIT_TAG — Android app

      AI-powered bill ingestion and analysis. The AI reads and explains, but
      never invents a number.

      ### 📱 Install the Android app

      1. **Download** the **billology.apk** file from the **Assets** below (or
         the [Package Registry](../-/packages)).
      2. On your phone, open the file and tap **Install**. If prompted, allow
         the Install-unknown-apps permission for your browser or file manager
         (Settings → Apps → Special access → Install unknown apps).
      3. Open **Billology**, grant camera and photo permission, and submit a
         bill (photo, PDF, or pasted text).

      The app talks to the hosted backend at https://billology.onrender.com
      (free tier: the first request after idle may take about 30 s to wake).
      Requires Android 6.0 or newer. Unsigned preview build for external
      distribution. Full changelog in [CHANGELOG.md](CHANGELOG.md).
    assets:
      links:
        - name: "billology-$CI_COMMIT_TAG.apk (Android)"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/billology/$CI_COMMIT_TAG/billology-$CI_COMMIT_TAG.apk"
          link_type: package
          filepath: "/billology.apk"
